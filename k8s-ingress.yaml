apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: caps-ai-ingress
  namespace: caps-ai
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
    - hosts:
        - caps-ai.example.com
      secretName: caps-ai-tls
  rules:
    - host: caps-ai.example.com
      http:
        paths:
          - path: /api/v1
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
