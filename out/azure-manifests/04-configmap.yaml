apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: caps-ai
data:
  ENVIRONMENT: "production"
  APP_NAME: "CAPS AI API"
  APP_VERSION: "1.0.0"
  API_PREFIX: "/api/v1"
  MONGODB_URL: "mongodb://mongodb:27017"
  MONGODB_DB: "caps_ai"
  JWT_ALGORITHM: "HS256"
  ACCESS_TOKEN_EXPIRE_MINUTES: "15"
  REFRESH_TOKEN_EXPIRE_DAYS: "7"
  ACCOUNT_LOCKOUT_MAX_ATTEMPTS: "5"
  ACCOUNT_LOCKOUT_WINDOW_MINUTES: "15"
  ACCOUNT_LOCKOUT_DURATION_MINUTES: "30"
  AUTH_REGISTRATION_POLICY: "bootstrap_strict"
  OPENAI_MODEL: "gpt-4o-mini"
  OPENAI_TIMEOUT_SECONDS: "20"
  OPENAI_MAX_OUTPUT_TOKENS: "400"
  SIMILARITY_THRESHOLD: "0.8"
  RATE_LIMIT_MAX_REQUESTS: "100"
  RATE_LIMIT_WINDOW_SECONDS: "60"
  RESPONSE_ENVELOPE_ENABLED: "true"
  REDIS_ENABLED: "true"
  REDIS_URL: "redis://redis:6379/0"
  ANALYTICS_CACHE_TTL_SECONDS: "300"
  SCHEDULER_ENABLED: "true"
  SCHEDULER_LOCK_ID: "caps_ai_scheduler_primary"
  SCHEDULER_LOCK_TTL_SECONDS: "90"
  SCHEDULER_LOCK_RENEW_SECONDS: "20"
  SCHEDULED_NOTICE_POLL_SECONDS: "60"
  ANALYTICS_SNAPSHOT_HOUR_UTC: "0"
  ANALYTICS_SNAPSHOT_MINUTE_UTC: "15"
  CORS_ORIGINS: "https://caps-ai.example.com,http://localhost:5173,http://127.0.0.1:5173"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-config
  namespace: caps-ai
data:
  VITE_API_BASE_URL: "/api/v1"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: caps-ai
data:
  nginx.conf: |
    upstream api {
      server backend:8000;
    }

    server {
      listen 80;
      server_name _;
      client_max_body_size 50M;

      root /usr/share/nginx/html;
      index index.html index.htm;

      location /api/v1 {
        proxy_pass http://api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
      }

      location / {
        try_files $uri $uri/ /index.html;
      }

      error_page 404 /index.html;
    }

