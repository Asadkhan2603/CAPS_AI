name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  backend-static-analysis:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend deps and static analysis tools
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install -r backend/requirements-dev.txt

      - name: Flake8 backend safety-critical modules
        run: |
          python -m flake8 \
            backend/app/services/governance.py \
            backend/app/api/v1/endpoints/faculties.py \
            backend/app/api/v1/endpoints/departments.py \
            backend/app/api/v1/endpoints/programs.py \
            backend/app/api/v1/endpoints/specializations.py \
            backend/app/api/v1/endpoints/batches.py \
            backend/app/api/v1/endpoints/semesters.py \
            backend/app/api/v1/endpoints/classes.py \
            scripts/check_backend_safety.py

      - name: Mypy backend governance and academic setup safety-critical modules
        run: |
          python -m mypy --config-file mypy.ini \
            backend/app/services/governance.py \
            backend/app/api/v1/endpoints/faculties.py \
            backend/app/api/v1/endpoints/departments.py \
            backend/app/api/v1/endpoints/programs.py \
            backend/app/api/v1/endpoints/specializations.py \
            backend/app/api/v1/endpoints/batches.py \
            backend/app/api/v1/endpoints/semesters.py \
            backend/app/api/v1/endpoints/classes.py \
            scripts/check_backend_safety.py

      - name: Bandit backend
        run: |
          python -m bandit \
            -c bandit.yaml \
            backend/app/services/governance.py \
            backend/app/api/v1/endpoints/faculties.py \
            backend/app/api/v1/endpoints/departments.py \
            backend/app/api/v1/endpoints/programs.py \
            backend/app/api/v1/endpoints/specializations.py \
            backend/app/api/v1/endpoints/batches.py \
            backend/app/api/v1/endpoints/semesters.py \
            backend/app/api/v1/endpoints/classes.py \
            scripts/check_backend_safety.py

      - name: Custom backend safety checks
        run: |
          python scripts/check_backend_safety.py

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend deps
        run: pip install -r requirements.txt

      - name: Run backend tests
        run: pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Run frontend tests
        run: npm run test:ci

      - name: Build frontend
        run: npm run build
